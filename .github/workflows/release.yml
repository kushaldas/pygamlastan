  publish:
    runs-on: ubuntu-latest
    needs: [manylinux_x86_64]
    environment: pypi
    permissions:
      id-token: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        pattern: pygamlastan_*
        merge-multiple: true

    - name: List artifacts
      run: ls -lR dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/
