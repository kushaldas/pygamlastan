name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
env:
  FORCE_COLOR: "1"
  UV_LINK_MODE: "copy"
  UV_VERSION: "0.11.23"
jobs:

  manylinux_x86_64:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v7

    - name: Pull the manylinux image
      run: docker pull quay.io/pypa/manylinux_2_28_x86_64

    - name: Build the wheel inside manylinux container
      run: |
        docker run --rm \
          -e UV_VERSION=${{ env.UV_VERSION }} \
          -e RUSTUP_HOME=/opt/rustup \
          -e CARGO_HOME=/opt/cargo \
          -v ${{ github.workspace }}:/io \
          quay.io/pypa/manylinux_2_28_x86_64 \
          /bin/bash /io/.github/scripts/setup-manylinux-build-env.sh

    - name: Install UV and test
      run: |
        python3 -m pip install --user "uv==${UV_VERSION}"
        ~/.local/bin/uv venv
        ~/.local/bin/uv pip install pytest
        ~/.local/bin/uv pip install ./dist/pygamlastan-*.whl
        .venv/bin/python -m pytest tests/ -vvv

    - name: Store wheels
      uses: actions/upload-artifact@v4
      with:
        name: pygamlastan_manylinux_x86_64
        path: dist/
        overwrite: true
        retention-days: 3
        if-no-files-found: "error"
        compression-level: 0

